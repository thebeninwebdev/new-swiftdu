<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline | Swiftdu</title>
    <meta
      name="description"
      content="Swiftdu is temporarily offline. Reconnect to continue using campus errands and delivery services."
    />
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(99, 102, 241, 0.18), transparent 32%),
          radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.14), transparent 28%),
          #f8fafc;
        color: #111827;
        padding: 24px;
      }

      main {
        width: min(100%, 480px);
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 28px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        padding: 32px;
      }

      img {
        width: 132px;
        height: auto;
      }

      h1 {
        margin: 28px 0 12px;
        font-size: clamp(2rem, 5vw, 2.5rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: #475569;
        font-size: 1rem;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      a,
      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 14px 20px;
        text-decoration: none;
      }

      a {
        background: #111827;
        color: #ffffff;
      }

      button {
        background: #e0e7ff;
        color: #3730a3;
      }

      .status {
        margin-top: 16px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #4338ca;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #6366f1;
        box-shadow: 0 0 0 8px rgba(99, 102, 241, 0.12);
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.png" alt="Swiftdu" />
      <div class="status">
        <span class="dot"></span>
        Offline mode
      </div>
      <h1>You're offline for now.</h1>
      <p>
        Swiftdu will reconnect automatically when your internet comes back. You can
        retry now or return to the homepage once you're online again.
      </p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">Try again</button>
        <a href="/">Go to homepage</a>
      </div>
    </main>
  </body>
</html>
